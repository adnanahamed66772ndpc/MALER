# ট্যাগ পুশ করলে (যেমন v1.0.0) অটো বিল্ড হয়ে Releases এ EXE জিপ আপলোড হবে।
name: Create Release with EXE

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v1.0.1 ইত্যাদি

permissions:
  contents: write   # রিলিজ বানানো ও অ্যাসেট আপলোডের জন্য

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: |
          dotnet restore MailerApp.slnx
          dotnet build MailerApp.slnx -c Release --no-restore

      - name: Publish (অল-ইন-ওয়ান EXE)
        run: |
          dotnet publish src/MailerApp.Desktop/MailerApp.Desktop.csproj -c Release -r win-x64 --self-contained -o publish/Desktop
        working-directory: .

      - name: Zip
        run: Compress-Archive -Path publish/Desktop/* -DestinationPath MailerApp-win-x64.zip

      - name: Create Release – শুধু একটা EXE
        uses: softprops/action-gh-release@v2
        with:
          body: |
            **একটাই অ্যাপ।** **MailerApp-win-x64.zip** ডাউনলোড করুন, আনজিপ করে `MailerApp.Desktop.exe` চালান। UI + ইমেল সেন্ড একসাথে।
          files: MailerApp-win-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
