# প্রতিটি push to main এ নতুন রিলিজে EXE বানাবে (build-1, build-2, ...)
name: Release EXE on every push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: |
          dotnet restore MailerApp.slnx
          dotnet build MailerApp.slnx -c Release --no-restore

      - name: Publish (অল-ইন-ওয়ান EXE)
        run: |
          dotnet publish src/MailerApp.Desktop/MailerApp.Desktop.csproj -c Release -r win-x64 --self-contained -o publish/Desktop
        working-directory: .

      - name: Zip
        run: Compress-Archive -Path publish/Desktop/* -DestinationPath MailerApp-win-x64.zip

      - name: Create Release – শুধু একটা EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            **একটাই অ্যাপ।** **MailerApp-win-x64.zip** ডাউনলোড করুন, আনজিপ করে `MailerApp.Desktop.exe` চালান। UI + ইমেল সেন্ড একসাথে।
            ---
            Auto-release from push to main. Commit: ${{ github.sha }}
          files: MailerApp-win-x64.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
